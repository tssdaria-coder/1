name: Deploy Theme to Shopify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Shopify
        uses: Shopify/github-deployments@v1
        with:
          store: ${{ secrets.SHOPIFY_STORE_URL }}
          password: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          theme-id: 'unpublished'
          allow-live: false